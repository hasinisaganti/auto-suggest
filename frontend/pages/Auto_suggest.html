<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="autosuggest.css">
    <title>Document</title>
</head>
<body>
    <div>
        <span class="left">&#9881</span>
        <span class="right">&#8226 Online | <span id="timer">&#128336 0ms</span></span>
    </div>
     <div id="main">
   <h1><span class="H1">Scou</span><span class="H2">tify</span></h1>
    <p> One million phrases.Four Algorithms.Prefix based Auto Suggest.</p>
    <span>
       
         <span class="lens">&#128269</span>
         <input class="search-box" id="search-box" placeholder="Start typing to search">
        </span>

        <div id="suggestion-box">
            <!-- Suggestion box -->
        </div>
    </div>

    <script>
        var searchBox=document.getElementById("search-box");
        var suggestionBox=document.getElementById("suggestion-box");
        searchBox.addEventListener("input",function() {
            // 1: Get user typed text
            // 2: Make api call to get suggestion
            // 3: Display data in HTML
            var userInput=searchBox.value;
            if(userInput.trim()===""){
                suggestionBox.style.display="none";
               document.getElementById("timer").innerHTML=" &#128336 0ms";
               return;
            }
            else{
   var url1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
   var url3="&algorithm=brute&limit=10&weighted=false";
   var url=url1 + userInput + url3;
          fetch(url).
          then(function(response){
            return response.json();
          })
          .then(function(data){
             console.log(data);
             //timer//
             document.getElementById("timer").innerHTML= data.elapsedMs +"ms";
             var resultsArray=data.results;
             var htmlResults="";
             for(var i=0;i<resultsArray.length;i++){
                htmlResults+="<div id='suggestion-item'>" + resultsArray[i].text + "</div>"
             }
             suggestionBox.innerHTML=htmlResults;
             suggestionBox.style.display="block";
          })
        }
    })
    </script>
</body>
</html>
